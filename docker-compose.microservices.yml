# Экспериментальная сборка: отдельные процессы auth / hall / reservation / payment + notify-worker.
# Единая точка API для тестов: сервис gateway (nginx) на порту 8090 → см. deploy/nginx-gateway-microservices.conf
#
# Запуск: docker compose -f docker-compose.microservices.yml up --build
# Проверка: curl -s http://localhost:8090/api/health
#
# Фронтенд: локально npm run dev с proxy на http://localhost:8090 вместо 8080,
# либо отдельный nginx со статикой и proxy_pass на gateway:80.

x-api-env: &api_env
  DATABASE_URL: postgres://rbs:rbs@postgres:5432/restaurant_booking?sslmode=disable
  REDIS_ADDR: redis:6379
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
  JWT_SECRET: docker-ms-jwt-secret-min-32-characters-long!!
  FRONTEND_ORIGIN: http://localhost:5173
  PUBLIC_APP_URL: http://localhost:5173
  INTERNAL_SECRET: internal-ms-shared-secret-change

services:
  postgres:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    environment:
      POSTGRES_USER: rbs
      POSTGRES_PASSWORD: rbs
      POSTGRES_DB: restaurant_booking
    ports:
      - "5433:5432"
    volumes:
      - rbs_pgdata_ms:/var/lib/postgresql/data
      - ./deploy/docker-pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rbs -d restaurant_booking"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

  rabbitmq:
    image: rabbitmq:3-alpine

  auth:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      <<: *api_env
    expose:
      - "8081"

  hall:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: hall
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      <<: *api_env
    expose:
      - "8082"

  reservation:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: reservation
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      hall:
        condition: service_started
    environment:
      <<: *api_env
      HALL_SERVICE_URL: http://hall:8082
      UPLOAD_DIR: /data/uploads
    volumes:
      - rbs_uploads_ms:/data/uploads
    expose:
      - "8083"

  payment:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: payment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      <<: *api_env
    expose:
      - "8084"

  notify-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: notify-worker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      DATABASE_URL: postgres://rbs:rbs@postgres:5432/restaurant_booking?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    expose:
      - "8085"

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - auth
      - hall
      - reservation
      - payment
    volumes:
      - ./deploy/nginx-gateway-microservices.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8090:80"

volumes:
  rbs_pgdata_ms:
  rbs_uploads_ms:
