# Монолит API + Postgres + Redis + RabbitMQ + фронт (nginx: SPA + прокси /api и /ws).
# Плюс микросервисы + шлюз nginx:8080 для scripts/dev-restart.sh --gateway (см. nginx/nginx.conf).
# Запуск из корня репозитория: docker compose up --build
# Сайт: http://localhost (порт 80). API только внутри сети compose, снаружи — через nginx.

x-micro-env: &micro_env
  ADDR: ":8080"
  DATABASE_URL: postgres://rbs:rbs@postgres:5432/restaurant_booking?sslmode=disable
  REDIS_ADDR: redis:6379
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
  JWT_SECRET: docker-dev-jwt-secret-min-32-characters-long!!
  FRONTEND_ORIGIN: http://localhost:5173
  PUBLIC_APP_URL: http://localhost:5173
  INTERNAL_SECRET: internal-ms-shared-secret-change

services:
  postgres:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    environment:
      POSTGRES_USER: rbs
      POSTGRES_PASSWORD: rbs
      POSTGRES_DB: restaurant_booking
    ports:
      - "5433:5432"
    volumes:
      - rbs_pgdata:/var/lib/postgresql/data
      - ./deploy/docker-pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rbs -d restaurant_booking"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  auth:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      <<: *micro_env
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 45s

  hall:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: hall
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      <<: *micro_env
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 45s

  reservation:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: reservation
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      hall:
        condition: service_healthy
    environment:
      <<: *micro_env
      HALL_SERVICE_URL: http://hall:8080
      UPLOAD_DIR: /data/uploads
    volumes:
      - rbs_uploads:/data/uploads
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s

  payment:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: payment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      <<: *micro_env
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 45s

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      auth:
        condition: service_healthy
      hall:
        condition: service_healthy
      reservation:
        condition: service_healthy
      payment:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    environment:
      ADDR: ":8080"
      DATABASE_URL: postgres://rbs:rbs@postgres:5432/restaurant_booking?sslmode=disable
      REDIS_ADDR: redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JWT_SECRET: docker-dev-jwt-secret-min-32-characters-long!!
      FRONTEND_ORIGIN: http://localhost
      PUBLIC_APP_URL: http://localhost
      UPLOAD_DIR: /data/uploads
    volumes:
      - rbs_uploads:/data/uploads
    expose:
      - "8080"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  rbs_pgdata:
  rbs_uploads:
