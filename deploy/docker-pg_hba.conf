# Явный pg_hba для Docker: старые тома Postgres могли оставить правила без сети 172.x,
# из‑за чего сервисы получали FATAL: no pg_hba.conf entry … (SQLSTATE 28000).
# Пароль по-прежнему обязателен (scram-sha-256), кроме local/loopback.

local   all             all                                     trust
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust
host    all             all             0.0.0.0/0               scram-sha-256
host    all             all             ::/0                    scram-sha-256
