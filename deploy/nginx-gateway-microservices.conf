# Пример единой точки входа для разнесённых сервисов (см. docker-compose.microservices.yml).
# Сервисы слушают порты из cmd/*: auth :8081, hall :8082, reservation :8083, payment :8084.

upstream auth_svc {
    server auth:8081;
}
upstream hall_svc {
    server hall:8082;
}
upstream reservation_svc {
    server reservation:8083;
}
upstream payment_svc {
    server payment:8084;
}

server {
    listen 80;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/auth/ {
        proxy_pass http://auth_svc;
    }

    location /api/payments/ {
        proxy_pass http://payment_svc;
    }

    location ~ ^/api/(halls|booking-defaults|restaurants)(/|$) {
        proxy_pass http://hall_svc;
    }

    location /ws {
        proxy_pass http://hall_svc;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api/files/ {
        proxy_pass http://reservation_svc;
    }

    location /api/ {
        proxy_pass http://reservation_svc;
    }

    location / {
        return 404;
    }
}
