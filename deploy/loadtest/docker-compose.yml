# Нагрузочное тестирование: k6 пишет метрики в InfluxDB 1.x, Grafana визуализирует.
# Запуск из каталога deploy/loadtest:
#   docker compose up -d
# Затем с хоста (API на :8080):
#   bash ../../scripts/run-k6-loadtest.sh
#
# Grafana: http://localhost:3001 (логин admin / пароль из GRAFANA_ADMIN_PASSWORD)
# InfluxDB: порт 8086 (только для k6, наружу по желанию)

services:
  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_ADMIN_USER: admin
      INFLUXDB_ADMIN_PASSWORD: adminpass
      INFLUXDB_HTTP_AUTH_ENABLED: "false"

  grafana:
    image: grafana/grafana:10.4.3
    ports:
      - "3001:3000"
    depends_on:
      - influxdb
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: dark
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

  # k6 в той же сети, что и InfluxDB → запись метрик по http://influxdb:8086 (без host.docker.internal).
  # Запуск: из корня репозитория bash scripts/run-k6-loadtest.sh (после up -d этого compose).
  k6:
    image: grafana/k6:latest
    profiles:
      - load
    depends_on:
      - influxdb
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../../scripts/k6:/scripts:ro
    environment:
      BASE_URL: http://host.docker.internal:8080
      TOKEN: ""
